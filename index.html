<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sugasaki — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Noto+Sans+JP:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;0,800;1,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg: #0a0a0b;
  --bg-card: #111113;
  --bg-card-hover: #18181b;
  --border: #222225;
  --border-hover: #3a3a40;
  --text: #e8e6e3;
  --text-dim: #7a7872;
  --text-muted: #4a4944;
  --accent: #d4a853;
  --accent-dim: #b8923a;
  --accent-glow: rgba(212,168,83,0.08);
  --public: #3fb950;
  --private: #f97583;
  --star: #e3b341;
  --mono: 'DM Mono', 'Menlo', monospace;
  --sans: 'Noto Sans JP', sans-serif;
  --display: 'Playfair Display', serif;
  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
}

html { font-size: 16px; scroll-behavior: smooth; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* Grain overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 9999;
  pointer-events: none;
  opacity: 0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 256px;
}

/* Ambient glow */
.ambient {
  position: fixed;
  top: -40vh;
  left: 50%;
  transform: translateX(-50%);
  width: 80vw;
  height: 60vh;
  background: radial-gradient(ellipse at center, rgba(212,168,83,0.04) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ─── HEADER ─── */
header {
  position: relative;
  z-index: 1;
  padding: 4rem 2rem 3rem;
  max-width: 1400px;
  margin: 0 auto;
}

.header-top {
  display: flex;
  align-items: flex-end;
  gap: 1.5rem;
  margin-bottom: 1rem;
}

.avatar {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  border: 2px solid var(--border);
  opacity: 0;
  animation: fadeUp 0.8s var(--ease-out-expo) 0.1s forwards;
}

.title-block {
  opacity: 0;
  animation: fadeUp 0.8s var(--ease-out-expo) 0.2s forwards;
}

h1 {
  font-family: var(--display);
  font-weight: 800;
  font-size: clamp(2.5rem, 5vw, 4rem);
  letter-spacing: -0.02em;
  line-height: 1;
  color: var(--text);
}

h1 span {
  color: var(--accent);
}

.subtitle {
  font-family: var(--mono);
  font-size: 0.8rem;
  color: var(--text-dim);
  margin-top: 0.5rem;
  letter-spacing: 0.05em;
}

.stats-row {
  display: flex;
  gap: 2rem;
  margin-top: 1.5rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--border);
  opacity: 0;
  animation: fadeUp 0.8s var(--ease-out-expo) 0.35s forwards;
}

.stat {
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
}

.stat-value {
  font-family: var(--mono);
  font-size: 1.5rem;
  font-weight: 500;
  color: var(--accent);
}

.stat-label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-muted);
}

/* ─── CONTROLS ─── */
.controls {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,10,11,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 1rem 2rem;
  transition: box-shadow 0.3s;
}

.controls.scrolled {
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

.controls-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 0.75rem;
}

.search-box {
  flex: 1;
  min-width: 200px;
  max-width: 360px;
  position: relative;
}

.search-box svg {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  width: 16px;
  height: 16px;
}

.search-box input {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 0.8rem;
  padding: 0.6rem 0.8rem 0.6rem 2.2rem;
  border-radius: 6px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.search-box input::placeholder {
  color: var(--text-muted);
}

.search-box input:focus {
  border-color: var(--accent-dim);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.filter-group {
  display: flex;
  gap: 0.35rem;
  flex-wrap: wrap;
}

.filter-btn {
  font-family: var(--mono);
  font-size: 0.7rem;
  padding: 0.4rem 0.7rem;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  letter-spacing: 0.02em;
}

.filter-btn:hover {
  border-color: var(--border-hover);
  color: var(--text);
}

.filter-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--bg);
  font-weight: 500;
}

.filter-btn .count {
  opacity: 0.6;
  margin-left: 0.3em;
}

.visibility-toggle {
  display: flex;
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  margin-left: auto;
}

.vis-btn {
  font-family: var(--mono);
  font-size: 0.7rem;
  padding: 0.4rem 0.65rem;
  border: none;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.vis-btn:not(:last-child) {
  border-right: 1px solid var(--border);
}

.vis-btn:hover {
  color: var(--text);
}

.vis-btn.active {
  background: var(--bg-card-hover);
  color: var(--text);
}

.sort-btn {
  font-family: var(--mono);
  font-size: 0.7rem;
  padding: 0.4rem 0.65rem;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 0.3rem;
}

.sort-btn:hover {
  border-color: var(--border-hover);
  color: var(--text);
}

.result-count {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-left: 0.5rem;
  white-space: nowrap;
}

/* ─── GRID ─── */
.grid-wrapper {
  position: relative;
  z-index: 1;
  max-width: 1400px;
  margin: 0 auto;
  padding: 2rem;
}

.repo-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}

.repo-card {
  background: var(--bg-card);
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
  cursor: pointer;
  transition: background 0.25s, transform 0.25s var(--ease-out-expo);
  position: relative;
  text-decoration: none;
  color: inherit;
}

.repo-card:hover {
  background: var(--bg-card-hover);
}

.repo-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: var(--lang-color, var(--accent));
  opacity: 0;
  transition: opacity 0.25s;
}

.repo-card:hover::before {
  opacity: 1;
}

.card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 0.75rem;
}

.repo-name {
  font-family: var(--mono);
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--text);
  word-break: break-word;
  line-height: 1.3;
}

.badges {
  display: flex;
  gap: 0.4rem;
  flex-shrink: 0;
}

.badge {
  font-family: var(--mono);
  font-size: 0.6rem;
  padding: 0.2rem 0.45rem;
  border-radius: 3px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 500;
}

.badge-public {
  background: rgba(63,185,80,0.1);
  color: var(--public);
  border: 1px solid rgba(63,185,80,0.2);
}

.badge-private {
  background: rgba(249,117,131,0.1);
  color: var(--private);
  border: 1px solid rgba(249,117,131,0.2);
}

.repo-desc {
  font-size: 0.8rem;
  color: var(--text-dim);
  line-height: 1.55;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.repo-meta {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-top: auto;
  padding-top: 0.5rem;
}

.meta-item {
  display: flex;
  align-items: center;
  gap: 0.35rem;
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--text-muted);
}

.lang-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.star-icon {
  color: var(--star);
}

/* ─── EMPTY STATE ─── */
.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 4rem 2rem;
  background: var(--bg-card);
}

.empty-state p {
  font-family: var(--mono);
  font-size: 0.85rem;
  color: var(--text-muted);
}

/* ─── FOOTER ─── */
footer {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 3rem 2rem;
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--text-muted);
  border-top: 1px solid var(--border);
  max-width: 1400px;
  margin: 2rem auto 0;
}

footer a {
  color: var(--accent-dim);
  text-decoration: none;
}

footer a:hover {
  color: var(--accent);
}

/* ─── ANIMATIONS ─── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.repo-card {
  opacity: 0;
  animation: fadeUp 0.5s var(--ease-out-expo) forwards;
}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

/* ─── RESPONSIVE ─── */
@media (max-width: 768px) {
  header { padding: 2.5rem 1.25rem 2rem; }
  .header-top { flex-direction: column; align-items: flex-start; gap: 1rem; }
  .avatar { width: 56px; height: 56px; }
  .stats-row { gap: 1.5rem; }
  .controls { padding: 0.75rem 1.25rem; }
  .controls-inner { gap: 0.5rem; }
  .search-box { min-width: 100%; max-width: 100%; order: -1; }
  .filter-group { width: 100%; overflow-x: auto; flex-wrap: nowrap; padding-bottom: 0.25rem; }
  .filter-group::-webkit-scrollbar { display: none; }
  .visibility-toggle { margin-left: 0; }
  .grid-wrapper { padding: 1rem 1.25rem; }
  .repo-grid { grid-template-columns: 1fr; }
  .repo-card { padding: 1.25rem; }
}

@media (max-width: 480px) {
  h1 { font-size: 2rem; }
  .stats-row { flex-wrap: wrap; gap: 1rem; }
}

/* Loading skeleton */
.skeleton {
  background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-card-hover) 50%, var(--bg-card) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 4px;
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
</style>
</head>
<body>

<div class="ambient"></div>

<header>
  <div class="header-top">
    <img class="avatar" id="avatar" src="" alt="sugasaki" width="72" height="72">
    <div class="title-block">
      <h1>suga<span>saki</span></h1>
      <p class="subtitle" id="bio">loading...</p>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat">
      <span class="stat-value" id="totalRepos">—</span>
      <span class="stat-label">Repositories</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="totalStars">—</span>
      <span class="stat-label">Stars</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="totalLangs">—</span>
      <span class="stat-label">Languages</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="publicCount">—</span>
      <span class="stat-label">Public</span>
    </div>
  </div>
</header>

<nav class="controls" id="controls">
  <div class="controls-inner">
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Search repositories...">
    </div>
    <div class="filter-group" id="langFilters"></div>
    <div class="visibility-toggle">
      <button class="vis-btn active" data-vis="all">All</button>
      <button class="vis-btn" data-vis="public">Public</button>
      <button class="vis-btn" data-vis="private">Private</button>
    </div>
    <button class="sort-btn" id="sortBtn" title="Toggle sort order">
      <span>Updated</span>
      <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><path d="M6 1L10 5H2L6 1ZM6 11L2 7H10L6 11Z" opacity="0.4"/><path id="sortArrow" d="M6 1L10 5H2L6 1Z"/></svg>
    </button>
    <span class="result-count" id="resultCount"></span>
  </div>
</nav>

<main class="grid-wrapper">
  <div class="repo-grid" id="repoGrid">
    <!-- Cards injected by JS -->
  </div>
</main>

<footer>
  <p>Built with data from <a href="https://github.com/sugasaki" target="_blank" rel="noopener">github.com/sugasaki</a> — Last updated <span id="lastUpdated"></span></p>
</footer>

<script>
// Language colors (GitHub-style)
const LANG_COLORS = {
  'TypeScript': '#3178c6', 'JavaScript': '#f1e05a', 'C#': '#178600',
  'Kotlin': '#A97BFF', 'HTML': '#e34c26', 'C++': '#f34b7d',
  'Vue': '#41b883', 'PHP': '#4F5D95', 'Shell': '#89e051',
  'Python': '#3572A5', 'Objective-C': '#438eff', 'Dockerfile': '#384d54',
  'SCSS': '#c6538c', 'Rust': '#dea584', 'CoffeeScript': '#244776',
  'CSS': '#563d7c', 'C': '#555555', 'Other': '#8b8b8b'
};

let repos = [];
let filteredRepos = [];
let activeLang = 'all';
let activeVis = 'all';
let sortAsc = false;
let searchQuery = '';

// Fetch user info
fetch('https://api.github.com/users/sugasaki')
  .then(r => r.json())
  .then(user => {
    document.getElementById('avatar').src = user.avatar_url;
    document.getElementById('bio').textContent = user.bio || 'Software Engineer';
  })
  .catch(() => {
    document.getElementById('avatar').src = 'https://github.com/sugasaki.png';
    document.getElementById('bio').textContent = 'Software Engineer';
  });

// Load repos
fetch('repos.json')
  .then(r => r.json())
  .then(data => {
    repos = data.map(r => ({
      name: r.name,
      description: r.description,
      url: r.url,
      isPrivate: r.isPrivate,
      language: r.primaryLanguage?.name || 'Other',
      stars: r.stargazerCount || 0,
      updatedAt: r.updatedAt,
      topics: (r.repositoryTopics?.nodes || []).map(t => t.topic.name)
    })).sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));

    updateStats();
    buildLangFilters();
    render();
  });

function updateStats() {
  const totalStars = repos.reduce((s, r) => s + r.stars, 0);
  const langs = new Set(repos.map(r => r.language));
  const publicCount = repos.filter(r => !r.isPrivate).length;

  document.getElementById('totalRepos').textContent = repos.length;
  document.getElementById('totalStars').textContent = totalStars;
  document.getElementById('totalLangs').textContent = langs.size;
  document.getElementById('publicCount').textContent = publicCount;
}

function buildLangFilters() {
  const counts = {};
  repos.forEach(r => { counts[r.language] = (counts[r.language] || 0) + 1; });
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);

  const container = document.getElementById('langFilters');
  container.innerHTML = `<button class="filter-btn active" data-lang="all">All<span class="count">${repos.length}</span></button>`;
  sorted.forEach(([lang, count]) => {
    container.innerHTML += `<button class="filter-btn" data-lang="${lang}">${lang}<span class="count">${count}</span></button>`;
  });

  container.addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    container.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeLang = btn.dataset.lang;
    render();
  });
}

function applyFilters() {
  filteredRepos = repos.filter(r => {
    if (activeLang !== 'all' && r.language !== activeLang) return false;
    if (activeVis === 'public' && r.isPrivate) return false;
    if (activeVis === 'private' && !r.isPrivate) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      return r.name.toLowerCase().includes(q) ||
             (r.description || '').toLowerCase().includes(q) ||
             r.language.toLowerCase().includes(q) ||
             r.topics.some(t => t.toLowerCase().includes(q));
    }
    return true;
  });

  filteredRepos.sort((a, b) => {
    const diff = new Date(b.updatedAt) - new Date(a.updatedAt);
    return sortAsc ? -diff : diff;
  });
}

function formatDate(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diffMs = now - d;
  const diffDays = Math.floor(diffMs / 86400000);

  if (diffDays === 0) return 'today';
  if (diffDays === 1) return 'yesterday';
  if (diffDays < 30) return `${diffDays}d ago`;
  if (diffDays < 365) return `${Math.floor(diffDays / 30)}mo ago`;
  return `${Math.floor(diffDays / 365)}y ago`;
}

function render() {
  applyFilters();

  const grid = document.getElementById('repoGrid');
  document.getElementById('resultCount').textContent = `${filteredRepos.length} repos`;

  if (filteredRepos.length === 0) {
    grid.innerHTML = '<div class="empty-state"><p>No repositories match the current filters.</p></div>';
    return;
  }

  grid.innerHTML = filteredRepos.map((r, i) => {
    const color = LANG_COLORS[r.language] || LANG_COLORS['Other'];
    const visBadge = r.isPrivate
      ? '<span class="badge badge-private">Private</span>'
      : '<span class="badge badge-public">Public</span>';
    const starsHtml = r.stars > 0
      ? `<span class="meta-item"><span class="star-icon">★</span> ${r.stars}</span>`
      : '';
    const descHtml = r.description
      ? `<p class="repo-desc">${escapeHtml(r.description)}</p>`
      : '';

    return `
      <a class="repo-card" href="${r.isPrivate ? '#' : r.url}" ${r.isPrivate ? '' : 'target="_blank" rel="noopener"'} style="--lang-color:${color}; animation-delay:${Math.min(i * 30, 600)}ms">
        <div class="card-header">
          <span class="repo-name">${escapeHtml(r.name)}</span>
          <div class="badges">${visBadge}</div>
        </div>
        ${descHtml}
        <div class="repo-meta">
          <span class="meta-item"><span class="lang-dot" style="background:${color}"></span>${escapeHtml(r.language)}</span>
          ${starsHtml}
          <span class="meta-item">${formatDate(r.updatedAt)}</span>
        </div>
      </a>`;
  }).join('');
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// Event listeners
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  render();
});

document.querySelectorAll('.vis-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.vis-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeVis = btn.dataset.vis;
    render();
  });
});

document.getElementById('sortBtn').addEventListener('click', () => {
  sortAsc = !sortAsc;
  const arrow = document.getElementById('sortArrow');
  arrow.setAttribute('d', sortAsc ? 'M6 11L2 7H10L6 11Z' : 'M6 1L10 5H2L6 1Z');
  render();
});

// Sticky shadow on scroll
const controls = document.getElementById('controls');
const observer = new IntersectionObserver(
  ([e]) => controls.classList.toggle('scrolled', !e.isIntersecting),
  { threshold: [1], rootMargin: '-1px 0px 0px 0px' }
);
observer.observe(controls);

// Last updated date
document.getElementById('lastUpdated').textContent = new Date().toLocaleDateString('ja-JP');

// Keyboard shortcut: / to focus search
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
  if (e.key === 'Escape') {
    document.getElementById('searchInput').blur();
  }
});
</script>
